# Lefthook config
# Docs: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,ts,svelte,json,md,yml,yaml,css}'
      run: pnpm prettier --check {staged_files}
      stage_fixed: false
    lint:
      glob: '*.{js,ts,svelte}'
      run: pnpm eslint --no-warn-ignored {staged_files}
    forbidden-imports:
      glob: 'src/**/*.{ts,svelte}'
      run: |
        if grep -rn -E "from ['\"](\\./)*\\.\\./prototypes" {staged_files}; then
          echo "❌ Imports from prototypes/ are forbidden. See AGENTS.md."
          exit 1
        fi

commit-msg:
  commands:
    conventional:
      run: |
        msg_file="{1}"
        if [ -z "$msg_file" ] || [ ! -f "$msg_file" ]; then
          echo "❌ Commit message file is missing."
          exit 1
        fi
        head -n1 "$msg_file" | grep -qE '^(feat|fix|chore|docs|refactor|test|perf|build|ci|style|revert)(\([a-z0-9-]+\))?: .+' || {
          echo "❌ Commit message must follow Conventional Commits."
          echo "   Example: feat(song-list): add filter by tag"
          exit 1
        }

pre-push:
  parallel: false
  commands:
    types:
      run: pnpm check
    test:
      run: pnpm test
    build:
      run: pnpm build
