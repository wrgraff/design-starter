<!doctype html>
<html lang="en" %sveltekit.theme%>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- Theme color reacts to OS theme; manifest theme_color is also set -->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />

		<!-- Apple touch icon (PWA on iOS) -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />

		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="32x32" />

		<!-- Manifest is generated by @vite-pwa/sveltekit -->

		<!-- Prevent FOUC (flash of unstyled / wrong theme). Runs before any paint.
		     Reads localStorage.theme ('light' | 'dark' | 'system') and applies .dark
		     class on <html>. The matching state.svelte.ts keeps storage in sync. -->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('theme') || 'system';
					var preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var isDark = stored === 'dark' || (stored === 'system' && preferDark);
					if (isDark) document.documentElement.classList.add('dark');
				} catch (e) {
					/* localStorage unavailable — ignore */
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
